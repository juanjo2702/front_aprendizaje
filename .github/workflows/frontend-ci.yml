name: Frontend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - './**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - './**'

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ./package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Run linting
        run: npm run lint
        working-directory: .

      - name: Run tests
        run: npm run test
        working-directory: .

      - name: Run formatting check
        run: npx prettier --check .
        working-directory: .

      - name: Build project
        run: npm run build
        working-directory: .
