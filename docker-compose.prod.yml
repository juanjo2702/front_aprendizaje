version: '3.8'

services:
  # Quasar Frontend (build estático servido por nginx, contenedor solo para build)
  frontend:
    build:
      context: ./frontend_web
      dockerfile: Dockerfile
      target: production
    container_name: plataforma_frontend_prod
    restart: unless-stopped
    environment:
      - VITE_API_URL=/api
      - VITE_APP_ENV=production
    # Montar volumen de solo lectura con los archivos construidos
    volumes:
      - frontend_dist_prod:/app/dist
    networks:
      - frontend_network_prod
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    # Comando: no necesario, el contenedor solo construye y sale (usamos artefactos)
    # Para simplificar, usamos un contenedor que solo ejecuta el build y luego permanece inactivo
    command: echo "Frontend built successfully" && tail -f /dev/null
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # Nginx como servidor de archivos estáticos del frontend
  nginx:
    image: nginx:alpine
    container_name: plataforma_frontend_nginx_prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - frontend_dist_prod:/usr/share/nginx/html:ro
      - ./frontend_web/.docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ssl_certs:/etc/ssl/certs:ro
      - ssl_private:/etc/ssl/private:ro
    depends_on:
      - frontend
    networks:
      - frontend_network_prod
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

networks:
  frontend_network_prod:
    driver: bridge

volumes:
  frontend_dist_prod:
    driver: local
  ssl_certs:
    driver: local
  ssl_private:
    driver: local
